# Bridge config for all 3 robots + clock
#
# CRITICAL: Each robot's diff_drive TF publishes to its OWN /robot_N/tf topic.
# Reason: three robots sharing a single /tf topic causes "jump back in time"
# in tf2_ros::Buffer because the three bridge threads write concurrently and
# their sim_time ordering is non-deterministic. Isolated per-robot topics
# eliminate cross-robot ordering race conditions entirely.
#
# /clock MUST be first so Nav2 sim_time is stable before any TF data arrives.

# --- shared clock (FIRST) ---
- ros_topic_name: /clock
  gz_topic_name: /clock
  ros_type_name: rosgraph_msgs/msg/Clock
  gz_type_name: gz.msgs.Clock
  direction: GZ_TO_ROS

# --- robot_1 ---
- ros_topic_name: /robot_1/cmd_vel
  gz_topic_name: /model/robot_1/cmd_vel
  ros_type_name: geometry_msgs/msg/Twist
  gz_type_name: gz.msgs.Twist
  direction: ROS_TO_GZ

- ros_topic_name: /robot_1/odom
  gz_topic_name: /model/robot_1/odometry
  ros_type_name: nav_msgs/msg/Odometry
  gz_type_name: gz.msgs.Odometry
  direction: GZ_TO_ROS

- ros_topic_name: /robot_1/scan
  gz_topic_name: /model/robot_1/scan
  ros_type_name: sensor_msgs/msg/LaserScan
  gz_type_name: gz.msgs.LaserScan
  direction: GZ_TO_ROS

- ros_topic_name: /robot_1/imu
  gz_topic_name: /model/robot_1/imu
  ros_type_name: sensor_msgs/msg/Imu
  gz_type_name: gz.msgs.IMU
  direction: GZ_TO_ROS

- ros_topic_name: /robot_1/tf
  gz_topic_name: /model/robot_1/tf
  ros_type_name: tf2_msgs/msg/TFMessage
  gz_type_name: gz.msgs.Pose_V
  direction: GZ_TO_ROS

